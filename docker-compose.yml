version: '3.8'

services:
  # 1. Cơ sở dữ liệu chính - MongoDB
  mongodb:
    image: mongo:6.0
    container_name: ai_business_db
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agent-network

  # 2. Bộ não hệ thống - Backend FastAPI
  api:
    build: ./backend
    container_name: ai_business_api
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - agent-network

  # 3. Giao diện Web Chat - Frontend React
  frontend:
    build: ./frontend
    container_name: ai_business_frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mongodb_data:
